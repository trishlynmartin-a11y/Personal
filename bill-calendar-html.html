<script>
// ── Config ────────────────────────────────────────────────────────────────────
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6j3ES4SqUyrWPETX1AfLvPAykJ6pQK4heAKXcvhWXh-2sXtnuW3aD1IxKI9zmkg-W/exec";

// ── Default data ──────────────────────────────────────────────────────────────
const BILL_TEMPLATES_DEFAULT = [

  {id:37,day:24,name:"Upstart",amount:149.84},
  {id:38,day:24,name:"Renters Insurance",amount:34.34},
  {id:39,day:24,name:"Klarna (Tim Tickets)",amount:55.28},
  {id:40,day:26,name:"Jim Car",amount:306.00},
  {id:41,day:28,name:"Camper Insurance",amount:45.85},
  {id:42,day:28,name:"Affirm (Jameson Bday)",amount:37.11},
  {id:43,day:28,name:"US Bank",amount:80.00},

];
const DEFAULT_CATS=()=>[
  {label:"Groceries",icon:"🛒",pct:15,entries:[]},
  {label:"Gas/Transport",icon:"⛽",pct:8,entries:[]},
  {label:"Dining Out",icon:"🍔",pct:5,entries:[]},
  {label:"Kids/Family",icon:"👨‍👩‍👧",pct:5,entries:[]},
  {label:"Personal Care",icon:"💅",pct:4,entries:[]},
  {label:"Entertainment",icon:"🎉",pct:3,entries:[]},
  {label:"Savings",icon:"💰",pct:10,entries:[]},
  {label:"Emergency Fund",icon:"🚨",pct:5,entries:[]},
  {label:"Misc/Buffer",icon:"📦",pct:5,entries:[]},
];

// ── State ─────────────────────────────────────────────────────────────────────
let STATE = {
  templates: BILL_TEMPLATES_DEFAULT,
  paychecks: {0:'',1:'',2:''},
  cats: [DEFAULT_CATS(),DEFAULT_CATS(),DEFAULT_CATS()],
  selDay:null, selMon:null, showMgr:false, search:'',
  openCat:{0:null,1:null,2:null},
};

// ── Sync layer ────────────────────────────────────────────────────────────────
let syncTimer = null;
let pendingWrites = {};

function setSyncing(state){
  const el=document.getElementById('sync-indicator');
  if(!el)return;
  if(state==='busy'){el.className='busy';el.textContent='🔄 Syncing…';}
  else if(state==='error'){el.className='error';el.textContent='⚠️ Sync error';}
  else{el.className='idle';el.textContent='✅ Synced';}
}

async function sheetWrite(tab, data){
  const res = await fetch(SCRIPT_URL, {
    method:'POST',
    body: JSON.stringify({action:'write', tab, data}),
  });
  const json = await res.json();
  if(!json.ok) throw new Error(json.error||'Write failed');
}

async function sheetRead(tab){
  const url = `${SCRIPT_URL}?action=read&tab=${tab}&_=${Date.now()}`;
  const res = await fetch(url);
  const json = await res.json();
  if(!json.ok) throw new Error(json.error||'Read failed');
  return json.data;
}

function scheduleSync(tab, data){
  pendingWrites[tab] = data;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(flushSync, 800);
  setSyncing('busy');
}

async function flushSync(){
  const writes = {...pendingWrites};
  pendingWrites = {};
  try {
    await Promise.all(Object.entries(writes).map(([tab,data])=>sheetWrite(tab,data)));
    setSyncing('idle');
    showToast('✅ Saved to Google Sheets','ok');
  } catch(e){
    setSyncing('error');
    showToast('⚠️ Sync failed — check connection','err');
    console.error(e);
  }
}

function persist(tabs){
  if(!tabs||tabs.includes('bills'))    scheduleSync('bills',    STATE.templates);
  if(!tabs||tabs.includes('paychecks'))scheduleSync('paychecks',STATE.paychecks);
  if(!tabs||tabs.includes('cats0'))    scheduleSync('cats0',    STATE.cats[0]);
  if(!tabs||tabs.includes('cats1'))    scheduleSync('cats1',    STATE.cats[1]);
  if(!tabs||tabs.includes('cats2'))    scheduleSync('cats2',    STATE.cats[2]);
}

async function loadFromSheets(){
  setSyncing('busy');
  try {
    const [bills,paychecks,cats0,cats1,cats2] = await Promise.all([
      sheetRead('bills'), sheetRead('paychecks'),
      sheetRead('cats0'), sheetRead('cats1'), sheetRead('cats2'),
    ]);
    if(bills)     STATE.templates = bills;
    if(paychecks) STATE.paychecks = paychecks;
    if(cats0)     STATE.cats[0]   = cats0;
    if(cats1)     STATE.cats[1]   = cats1;
    if(cats2)     STATE.cats[2]   = cats2;
    setSyncing('idle');
  } catch(e){
    setSyncing('error');
    showToast('⚠️ Could not load from Sheets — showing defaults','err');
    console.error(e);
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer=null;
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=type; t.style.opacity=1;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.style.opacity=0,2200);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmt=n=>`$${Math.abs(n).toFixed(2)}`;
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONS=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONF=['','January','February','March','April','May','June','July','August','September','October','November','December'];
const dim=(m,y)=>new Date(y,m,0).getDate();
const dn=(y,m,d)=>y*10000+m*100+d;

function billClass(name){
  if(name==='Rent')return'bc-rent';
  if(['Citi Bank','Jim CC','Amex',"Cabela's",'Care Credit','Credit One','Capitol One','PayPal','PayPal (Rascal Flatts)','PayPal (Home Depot)','Apple','US Bank'].includes(name))return'bc-cc';
  if(['Avant','OneMain','Upstart','Upstart #2','Jim Loan (Teeth)'].includes(name))return'bc-loan';
  if(name.startsWith('Affirm')||name.startsWith('Klarna'))return'bc-ak';
  return'bc-rec';
}

// ── Pay period engine ─────────────────────────────────────────────────────────
function buildPaydays(ry,rm){
  const list=[];
  for(let d=-3;d<=6;d++){
    let m=rm+d,y=ry;
    while(m<1){m+=12;y--;}while(m>12){m-=12;y++;}
    list.push({y,m,d:13});list.push({y,m,d:27});
  }
  return list.sort((a,b)=>dn(a.y,a.m,a.d)-dn(b.y,b.m,b.d));
}
function getPayPeriods(today){
  const ty=today.getFullYear(),tm=today.getMonth()+1,td=today.getDate();
  const todayN=dn(ty,tm,td),paydays=buildPaydays(ty,tm);
  let idx=0;
  for(let i=0;i<paydays.length;i++){if(dn(paydays[i].y,paydays[i].m,paydays[i].d)<=todayN)idx=i;}
  const periods=[];
  for(let i=0;i<3;i++){
    const pi=idx+i;if(pi+1>=paydays.length)break;
    const pd=paydays[pi],npd=paydays[pi+1];
    periods.push({ppNum:i+1,payDate:pd,nextPayDate:npd,paydayStr:`${MONS[pd.m]} ${pd.d}`});
  }
  return periods;
}
function billPPIdx(bm,bd,by,periods){
  const bn=dn(by,bm,bd);
  for(let i=0;i<periods.length;i++){
    const pd=periods[i].payDate,npd=periods[i].nextPayDate;
    if(bn>=dn(pd.y,pd.m,pd.d)&&bn<dn(npd.y,npd.m,npd.d-1))return i;
  }
  return periods.length-1;
}
function genInstances(templates,periods){
  if(!periods.length)return[];
  const instances=[],seen=new Set();
  const first=periods[0].payDate,last=periods[periods.length-1].nextPayDate;
  let cy=first.y,cm=first.m;
  for(let iter=0;iter<6;iter++){
    templates.forEach(t=>{
      const maxD=dim(cm,cy),d=Math.min(t.day,maxD);
      const ppIdx=billPPIdx(cm,d,cy,periods);
      if(ppIdx<0||ppIdx>=periods.length)return;
      const bn=dn(cy,cm,d);
      if(bn<=dn(first.y,first.m,first.d)||bn>=dn(last.y,last.m,last.d-1))return;
      const key=`${t.id}-${cy}-${cm}`;
      if(seen.has(key))return;
      seen.add(key);
      instances.push({...t,instanceKey:key,month:cm,year:cy,day:d,ppIdx});
    });
    if(cy===last.y&&cm===last.m)break;
    cm++;if(cm>12){cm=1;cy++;}
  }
  return instances;
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
const el=(tag,attrs,...children)=>{
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e[k]=v;
    else if(k==='className')e.className=v;
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>c!=null&&e.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return e;
};
const div=(a,...c)=>el('div',a,...c);
const span=(a,...c)=>el('span',a,...c);
const btn=(a,...c)=>el('button',a,...c);
const inp=a=>el('input',a);

// ── Edit Modal ────────────────────────────────────────────────────────────────
function openEditModal(bill){
  const root=document.getElementById('modal-root');root.innerHTML='';
  const maxD=dim(bill.month,bill.year||new Date().getFullYear());
  const overlay=div({className:'modal-overlay'});
  const modal=div({className:'modal'});
  modal.onclick=e=>e.stopPropagation();
  overlay.onclick=()=>root.innerHTML='';
  modal.appendChild(div({style:{color:'#facc15',fontWeight:700,fontSize:'17px',marginBottom:'4px'}},'✏️ Edit Bill'));
  modal.appendChild(div({style:{color:'#9ca3af',fontSize:'13px',marginBottom:'18px'}},bill.name));
  const dayWrap=div({style:{marginBottom:'14px'}});
  dayWrap.appendChild(div({style:{color:'#9ca3af',fontSize:'12px',marginBottom:'4px'}},`Due Date (1–${maxD})`));
  const dayInp=inp({type:'number',value:bill.day,min:1,max:maxD,className:'inp',style:{width:'80px',marginBottom:'4px'}});
  const dayWarn=div({style:{color:'#facc15',fontSize:'11px',display:'none'}},'⚠️ May shift pay period.');
  dayInp.oninput=()=>{dayWarn.style.display=parseInt(dayInp.value)!==bill.day?'block':'none';};
  dayWrap.appendChild(dayInp);dayWrap.appendChild(dayWarn);modal.appendChild(dayWrap);
  const amtWrap=div({style:{marginBottom:'18px'}});
  amtWrap.appendChild(div({style:{color:'#9ca3af',fontSize:'12px',marginBottom:'4px'}},'Payment Amount'));
  const amtInp=inp({type:'number',value:bill.amount,min:0.01,step:0.01,className:'inp',style:{marginBottom:'4px'}});
  const amtNote=div({style:{fontSize:'11px',color:'#9ca3af',display:'none'}});
  amtInp.oninput=()=>{const a=parseFloat(amtInp.value);amtNote.style.display=a!==bill.amount?'block':'none';amtNote.innerHTML=`<s>${fmt(bill.amount)}</s> <span style="color:#4ade80">→ ${fmt(a||0)}</span>`;};
  amtWrap.appendChild(amtInp);amtWrap.appendChild(amtNote);modal.appendChild(amtWrap);
  const btnRow=div({style:{display:'flex',gap:'8px'}});
  btnRow.appendChild(btn({className:'btn-cancel',onclick:()=>root.innerHTML=''},'Cancel'));
  const saveBtn=btn({className:'btn-save'},'Save Changes');
  saveBtn.onclick=()=>{
    const d=parseInt(dayInp.value),a=parseFloat(amtInp.value);
    if(d>=1&&d<=maxD&&a>0){
      STATE.templates=STATE.templates.map(t=>t.id===bill.id?{...t,day:d,amount:a}:t);
      persist(['bills']);root.innerHTML='';render();
    }
  };
  btnRow.appendChild(saveBtn);modal.appendChild(btnRow);
  overlay.appendChild(modal);root.appendChild(overlay);
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  const today=new Date();
  const periods=getPayPeriods(today);
  const instances=genInstances(STATE.templates,periods);
  const byKey={};
  instances.forEach(b=>{const k=`${b.month}-${b.day}`;if(!byKey[k])byKey[k]=[];byKey[k].push(b);});
  const ppTotals=[0,0,0],ppLists=[[],[],[]];
  instances.forEach(b=>{if(b.ppIdx>=0&&b.ppIdx<3){ppTotals[b.ppIdx]+=b.amount;ppLists[b.ppIdx].push(b);}});
  ppLists.forEach(a=>a.sort((x,y)=>x.month!==y.month?x.month-y.month:x.day-y.day));
  const remainders=periods.map((_,i)=>{const pc=parseFloat(STATE.paychecks[i]);return isNaN(pc)?null:pc-ppTotals[i];});
  const seen=new Set(),monthsToShow=[];
  instances.forEach(b=>{const k=`${b.year}-${b.month}`;if(!seen.has(k)){seen.add(k);monthsToShow.push({y:b.year,m:b.month});}});
  monthsToShow.sort((a,b)=>a.y!==b.y?a.y-b.y:a.m-b.m);
  const pdMap={},pushMap={};
  periods.forEach(pp=>{
    const k=pp.payDate.m;if(!pdMap[k])pdMap[k]=[];pdMap[k].push(pp.payDate.d);
    const npd=pp.nextPayDate,k2=npd.m;if(!pushMap[k2])pushMap[k2]=[];
    pushMap[k2].push(npd.d-1);pushMap[k2].push(npd.d);
  });
  function ppIdxOf(month,day){
    const ty=today.getFullYear();
    for(let i=0;i<periods.length;i++){
      const pd=periods[i].payDate,npd=periods[i].nextPayDate;

  ovg.appendChild(div({style:{background:'#1f2937',borderRadius:'9px',padding:'10px',textAlign:'center'}},
    div({style:{color:'#9ca3af',fontSize:'10px',marginBottom:'3px'}},'Total Bills'),
    div({style:{color:'#f87171',fontWeight:700,fontSize:'17px'}},fmt(ppTotals.reduce((s,t)=>s+t,0)))
  ));
  const ppBgsFull=['rgba(20,83,45,0.25)','rgba(113,63,18,0.25)','rgba(30,58,138,0.25)'];
  const ppTxFull=['#4ade80','#facc15','#60a5fa'];
  periods.forEach((pp,i)=>{
    ovg.appendChild(div({style:{background:ppBgsFull[i],border:`1px solid ${ppColors[i]}`,borderRadius:'9px',padding:'10px',textAlign:'center'}},
      div({style:{color:ppTxFull[i],fontSize:'10px',marginBottom:'3px'}},`PP${i+1} · ${pp.paydayStr}`),
      div({style:{color:ppTxFull[i],fontWeight:700,fontSize:'17px'}},fmt(ppTotals[i]))
    ));
  });
  ov.appendChild(ovg);app.appendChild(ov);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async()=>{
  await loadFromSheets();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  render();
})();
</script>
</body>
